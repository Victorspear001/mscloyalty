<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
</head>
<body>

    <div id="authSection" class="container">
        <div class="card-box" style="margin-top:50px;">
            <img src="logo.png" style="width:80px; margin-bottom:10px;">
            <div id="loginForm">
                <h2>Admin Panel</h2>
                <input type="text" id="loginUser" placeholder="Username">
                <input type="password" id="loginPass" placeholder="Password">
                <button onclick="login()">Log In</button>
            </div>
        </div>
    </div>

    <div id="dashboardSection" class="container hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <img src="logo.png" style="height:40px;">
            <button onclick="logout()" style="width:auto; background:#607d8b; padding:5px 15px; font-size:0.8rem;">Logout</button>
        </div>

        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <button onclick="switchTab('list')" class="tab-btn" style="flex:1;">Customer List</button>
            <button onclick="switchTab('add')" class="tab-btn" style="flex:1; background:#ddd; color:#333;">Add New</button>
        </div>

        <div id="viewList">
            <input type="text" id="searchBar" placeholder="Search..." onkeyup="filterList()" style="margin-bottom:15px;">
            <div id="customerListContainer"></div>
        </div>

        <div id="viewAdd" class="hidden">
            <div class="card-box">
                <h3>New Customer</h3>
                <input type="text" id="newName" placeholder="Name">
                <input type="number" id="newMobile" placeholder="Mobile">
                <button onclick="saveCustomer()">Save & Generate ID</button>
            </div>
        </div>
    </div>

    <div id="idCardModal" class="modal-overlay hidden">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3>Customer ID Card</h3>
            
            <div id="modalIdCard" class="id-card-wrapper">
                <img src="logo.png" class="card-logo">
                <div class="card-title">MITHRAN SNACKS</div>
                <div class="card-detail">
                    <span>NAME</span> <strong id="modalCardName"></strong>
                </div>
                <div class="card-detail">
                    <span>MOBILE</span> <strong id="modalCardMobile"></strong>
                </div>
                <div class="card-id" id="modalCardID"></div>
            </div>

            <button onclick="downloadModalCard()" style="background:green; margin-top:15px;">Download JPG</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
