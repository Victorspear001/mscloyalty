<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
</head>
<body>
    <a href="index.html" class="home-btn"><i class="fas fa-home"></i></a>

    <div id="authSection" class="container">
        <div class="card-box text-center" style="margin-top:60px;">
            <img src="assets/images/logo.png" class="logo-login">
            <div id="loginForm">
                <h2>Admin Login</h2>
                <input type="text" id="loginUser" placeholder="Username">
                <input type="password" id="loginPass" placeholder="Password">
                <button class="btn-primary" onclick="login()">Log In</button>
            </div>
            <div id="regForm" class="hidden">
                <h2>New Admin</h2>
                <input type="email" id="regEmail" placeholder="Email">
                <input type="text" id="regUser" placeholder="Username">
                <input type="password" id="regPass" placeholder="Password">
                <button class="btn-primary" onclick="register()">Register</button>
                <div class="link" style="cursor:pointer; color:blue; margin-top:10px;" onclick="toggleAuth('login')">Back</div>
            </div>
        </div>
    </div>

    <div id="dashboardSection" class="container hidden">
        <div class="dashboard-header">
            <div class="brand-wrapper"><img src="assets/images/logo.png" class="header-logo"><h3 class="brand-name">Mithran Admin</h3></div>
            <button class="btn-secondary" onclick="logout()">Logout</button>
        </div>

        <a href="all_customers.html" class="admin-nav-link">View Archive <i class="fas fa-arrow-right"></i></a>

        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('list')">Customer List</button>
            <button class="tab-btn" onclick="switchTab('add')">Add New</button>
        </div>

        <div id="viewList">
            <div class="search-container">
                <input type="text" id="searchBar" placeholder="Search..." onkeyup="filterList()">
                <button class="btn-scan" onclick="initScanner()"><i class="fas fa-camera"></i></button>
            </div>
            
            <div class="tools-row">
                <button class="tool-btn" onclick="exportData()"><i class="fas fa-file-export"></i> Export CSV</button>
                <label class="tool-btn"><i class="fas fa-file-import"></i> Import CSV <input type="file" hidden onchange="importData(this)"></label>
            </div>

            <div id="customerListContainer">Loading...</div>
        </div>

        <div id="viewAdd" class="hidden">
            <div class="card-box">
                <h3>New Customer</h3>
                <input type="text" id="newName" placeholder="Name">
                <input type="number" id="newMobile" placeholder="Mobile">
                <button class="btn-primary" onclick="saveCustomer()">Register</button>
            </div>
        </div>
    </div>

    <div id="scannerModal" class="modal-overlay hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="closeScanner()">&times;</span>
            <h3>Scan QR</h3>
            <div id="reader" style="width: 100%; min-height: 250px; background: #000;"></div>
            <p style="font-size:0.8rem; color:red; margin-top:10px;" id="scanErrorMsg"></p>
        </div>
    </div>
    
    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3>Customer ID</h3>
            <div id="modalIdCard" class="id-card-container">
                <img src="assets/images/logo.png" class="card-logo-img">
                <div class="card-shop-title">Mithran Snacks</div>
                <div class="card-label">MEMBER NAME</div>
                <div class="card-value" id="modalName"></div>
                <div class="card-label">MOBILE</div>
                <div class="card-value" id="modalMobile"></div>
                <div class="card-id-badge" id="modalID"></div>
                <div id="modalQR" class="card-qr"></div>
            </div>
            <div class="share-options">
                <button class="btn-primary" onclick="downloadModalCard()">Download</button>
                <button id="shareBtn" class="btn-share" onclick="shareIdCard()"><i class="fas fa-share-alt"></i> Share</button>
            </div>
        </div>
    </div>

    <script src="assets/js/script.js"></script>
</body>
</html>
