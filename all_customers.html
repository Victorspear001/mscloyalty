<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Archive</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="dashboard-header">
            <h3 class="brand-name">Mithran Archive</h3>
            <a href="dashboard_msc.html" class="btn-secondary" style="text-decoration:none;">Back</a>
        </div>

        <div class="card-box">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="margin:0;">All Records</h3>
                <button class="btn-primary" style="font-size:0.8rem; padding:8px 12px;" onclick="downloadArchivePDF()">
                    <i class="fas fa-file-pdf"></i> Download PDF
                </button>
            </div>
            <div class="data-table-wrapper">
                <table class="data-table">
                    <thead><tr><th>Name</th><th>Mobile</th><th>ID</th><th>Status</th><th>View</th><th>Action</th></tr></thead>
                    <tbody id="fullCustomerTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3>ID Card</h3>
            <div id="modalIdCard" class="id-card-container">
                <img src="assets/images/logo.png" class="card-logo-img">
                <div class="card-shop-title">Mithran Snacks</div>
                <div class="card-label">MEMBER NAME</div>
                <div class="card-value" id="modalName"></div>
                <div class="card-label">MOBILE</div>
                <div class="card-value" id="modalMobile"></div>
                <div class="card-id-badge" id="modalID"></div>
                <div id="modalQR" class="card-qr"></div>
            </div>
            <div class="share-options">
                <button class="btn-primary" onclick="downloadModalCard()">Download</button>
            </div>
        </div>
    </div>
    <script src="assets/js/script.js"></script>
</body>
</html>
