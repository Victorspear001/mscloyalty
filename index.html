<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mithran Rewards</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="container">
        <!-- Logo Section -->
        <div class="text-center" style="margin-top: 40px;">
            <img src="assets/images/logo.png" style="width: 140px; border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.1);" id="secretLogo">
            <h2 style="color: var(--primary); margin-top: 10px;">Mithran Snacks</h2>
            <p style="color: #666;">Loyalty Rewards Program</p>
        </div>

        <!-- Check Status Card -->
        <div class="card-box" style="margin-top: 20px;">
            <h3>Check Your Stamps</h3>
            <p style="font-size: 0.9rem; color: #888; margin-bottom: 20px;">Enter your Member ID below</p>
            
            <input type="text" id="checkID" placeholder="MSC ID (e.g. MSC4492)">
            <button class="btn-primary" onclick="checkStatus()">Check Rewards</button>
        </div>

        <!-- Result Box (Hidden by default) -->
        <div id="resultBox" class="card-box hidden">
            <!-- Stats -->
            <div style="margin-bottom: 20px;">
                <h2 id="resName" style="margin: 0; color: var(--primary);"></h2>
                <div style="font-size: 3.5rem; font-weight: 800; color: var(--accent); line-height: 1;">
                    <span id="resStamps">0</span><span style="font-size: 1.5rem; color: #ccc;">/5</span>
                </div>
                <p id="resMsg" style="font-weight: 600; margin-top: 10px;"></p>
            </div>

            <!-- ID Card Display -->
            <div id="publicIdCard" class="id-card-container">
                <img src="assets/images/logo.png" class="card-logo-img">
                <div class="card-shop-title">Mithran Snacks</div>
                
                <div class="card-label">MEMBER NAME</div>
                <div class="card-value" id="pubCardName"></div>
                
                <div class="card-label">MOBILE</div>
                <div class="card-value" id="pubCardMobile"></div>
                
                <div class="card-id-badge" id="pubCardID"></div>
            </div>
        </div>
    </div>

    <script src="assets/js/script.js"></script>
    <script>
        // Secret Door Logic (5 Clicks)
        let clicks = 0;
        document.getElementById('secretLogo').addEventListener('click', () => {
            clicks++;
            if(clicks === 5) {
                window.location.href = 'dashboard_msc.html';
            }
            setTimeout(() => clicks = 0, 1000);
        });
    </script>
</body>
</html>
