<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mithran Snacks Corner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="customerView" class="view active">
        <div class="logo-container">
            <img src="logo.png" alt="Mithran Snacks" id="secretLogo" onclick="triggerSecretDoor()">
        </div>
        <h1>Check Your Rewards</h1>
        <div class="card">
            <input type="text" id="checkCustID" placeholder="Enter Your ID (e.g., MSC1234)">
            <button onclick="checkMyStatus()">Check Status</button>
            <div id="customerResult" class="hidden">
                <div id="publicIdCard"></div>
                 <h3 id="statusMessage"></h3>
            </div>
        </div>
    </section>

    <section id="authView" class="view hidden">
        <div class="logo-container small">
            <img src="logo.png" alt="Logo">
        </div>
        
        <div id="loginForm">
            <h2>Admin Login</h2>
            <input type="text" id="loginUser" placeholder="Username">
            <input type="password" id="loginPass" placeholder="Password">
            <button onclick="handleLogin()">Log In</button>
            <p class="link" onclick="toggleAuth('register')">Register New Admin</p>
            <p class="link" onclick="toggleAuth('reset')">Forgot Password?</p>
            <button class="btn-sec" onclick="goHome()">Back to Shop</button>
        </div>

        <div id="registerForm" class="hidden">
            <h2>Admin Registration</h2>
            <input type="email" id="regEmail" placeholder="Email Address (for recovery)">
            <input type="text" id="regUser" placeholder="Create Special Username">
            <input type="password" id="regPass" placeholder="Password">
            <button onclick="handleRegister()">Register</button>
            <p class="link" onclick="toggleAuth('login')">Back to Login</p>
        </div>

        <div id="resetForm" class="hidden">
            <h2>Reset Password</h2>
            <p>We will send a reset link to your registered email.</p>
            <input type="email" id="resetEmail" placeholder="Enter Registered Email">
            <button onclick="handlePasswordReset()">Send Reset Link</button>
            <p class="link" onclick="toggleAuth('login')">Back to Login</p>
        </div>
    </section>

    <section id="dashboardView" class="view hidden">
        <div class="nav-bar">
            <img src="logo.png" class="nav-logo">
            <h2>Admin Panel</h2>
            <button class="btn-sec small" onclick="handleLogout()">Logout</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('list')">Customer List</button>
            <button class="tab-btn" onclick="switchTab('add')">Add Customer</button>
        </div>

        <div id="tabList" class="tab-content active">
            <div class="controls">
                <input type="text" id="searchInput" placeholder="Search Name, Mobile, or ID..." onkeyup="filterCustomers()">
                <div class="csv-controls">
                    <button onclick="exportCSV()" class="btn-green"><i class="fas fa-file-export"></i> Export CSV</button>
                    <label for="csvInput" class="btn-blue"><i class="fas fa-file-import"></i> Import CSV</label>
                    <input type="file" id="csvInput" accept=".csv" onchange="importCSV(this)" hidden>
                </div>
            </div>
            <div id="customerTable">Loading...</div>
        </div>

        <div id="tabAdd" class="tab-content">
            <div class="split-layout">
                <div class="form-side">
                    <h3>New Customer Registration</h3>
                    <input type="text" id="newCustName" placeholder="Customer Name">
                    <input type="number" id="newCustMobile" placeholder="Mobile Number">
                    <button onclick="previewCard()">Generate ID Card</button>
                </div>
                <div class="preview-side hidden" id="cardPreviewBox">
                    <div id="idCardContainer">
                        <img src="logo.png" class="card-logo">
                        <div class="card-header">MITHRAN SNACKS</div>
                        <div class="card-chip"><i class="fas fa-microchip"></i></div>
                        <div class="card-body">
                            <div class="card-row">
                                <span>NAME</span>
                                <strong id="cardName"></strong>
                            </div>
                            <div class="card-row">
                                <span>MOBILE</span>
                                <strong id="cardMobile"></strong>
                            </div>
                        </div>
                        <div class="card-footer">
                            <div class="id-code" id="cardID">MSC----</div>
                            <small>Buy 4 Get 1 Free</small>
                        </div>
                    </div>
                    <button onclick="saveAndDownload()" class="btn-green">Save & Download</button>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
