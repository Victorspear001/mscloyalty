<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mithran Rewards</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="text-center" style="margin-top: 30px;">
            <img src="assets/images/logo.png" class="logo-login" id="secretLogo">
            <h2 style="color: var(--primary); margin-top: 10px;">Mithran Snacks</h2>
            <p style="color: #666;">Buy 4 Get 5th Free!</p>
        </div>

        <div class="card-box" style="margin-top: 20px;">
            <h3>Check Stamps</h3>
            <p style="font-size: 0.9rem; color: #888; margin-bottom: 20px;">Enter ID or Mobile</p>
            <input type="text" id="checkID" placeholder="MSC ID or Mobile Number">
            <button class="btn-primary" onclick="checkStatus()">Check Rewards</button>
        </div>

        <div id="resultBox" class="card-box hidden">
            <div style="margin-bottom: 20px;">
                <h2 id="resName" style="margin: 0; color: var(--primary);"></h2>
                <div style="background:#fff8e1; color:#ff8f00; display:inline-block; padding:5px 10px; border-radius:10px; font-weight:bold; margin-top:5px; font-size:0.9rem; border:1px solid #ffca28;">
                    Total Free Snacks Redeemed: <span id="pubRedeems">0</span>
                </div>
                <div style="font-size: 3.5rem; font-weight: 800; color: var(--accent); line-height: 1; margin-top:15px;">
                    <span id="resStamps">0</span><span style="font-size: 1.5rem; color: #ccc;">/4</span>
                </div>
                <p id="resMsg" style="font-weight: 600; margin-top: 10px;"></p>
            </div>
            <div id="publicIdCard" class="id-card-container" onclick="openCustomerModal()" title="Click to Download">
                <img src="assets/images/logo.png" class="card-logo-img">
                <div class="card-shop-title">Mithran Snacks</div>
                <div class="card-label">MEMBER NAME</div>
                <div class="card-value" id="pubCardName"></div>
                <div class="card-label">MOBILE</div>
                <div class="card-value" id="pubCardMobile"></div>
                <div class="card-id-badge" id="pubCardID"></div>
                <div id="pubCardQR" class="card-qr"></div>
            </div>
            <p style="font-size:0.7rem; color:#aaa; text-align:center; margin-top:5px;">Tap card to download</p>
        </div>
    </div>

    <div id="customerModalOverlay" class="modal-overlay hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="closeCustomerModal()">&times;</span>
            <h3>Your ID Card</h3>
            <div id="custModalIdCard" class="id-card-container" style="cursor:default;">
                <img src="assets/images/logo.png" class="card-logo-img">
                <div class="card-shop-title">Mithran Snacks</div>
                <div class="card-label">MEMBER NAME</div>
                <div class="card-value" id="custModalName"></div>
                <div class="card-label">MOBILE</div>
                <div class="card-value" id="custModalMobile"></div>
                <div class="card-id-badge" id="custModalID"></div>
                <div id="custModalQR" class="card-qr"></div>
            </div>
            <button class="btn-primary" onclick="downloadCustomerCard()"><i class="fas fa-download"></i> Download JPG</button>
        </div>
    </div>
    
    <div id="flyerOverlay" class="modal-overlay hidden" onclick="document.getElementById('flyerOverlay').classList.add('hidden')">
        <div class="modal-content" style="border: 4px solid var(--gold);">
            <div style="font-size: 2rem; color: var(--primary); font-weight: 800; text-transform: uppercase;">Congratulations!</div>
            <div style="font-size: 4rem; margin: 10px 0;">🎁</div>
            <div style="font-size: 1.1rem; color: #555; margin-bottom: 20px;">
                You have collected 4 Stamps!<br><strong>Your 5th Snack is FREE!</strong>
            </div>
            <button class="btn-primary">Awesome!</button>
        </div>
    </div>

    <script src="assets/js/script.js"></script>
    <script>
        let clicks = 0;
        document.getElementById('secretLogo').addEventListener('click', () => {
            clicks++; if(clicks===5) window.location.href='dashboard_msc.html'; setTimeout(()=>clicks=0, 1000);
        });
    </script>
</body>
</html>
